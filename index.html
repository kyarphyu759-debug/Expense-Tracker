<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kyar Phyu Finance Tracker</title>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Font Awesome CDN for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<!-- Mobile App Capabilities -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KP Finance">
<meta name="theme-color" content="#080d1a">
<link rel="apple-touch-icon" href="logo.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

:root {
    --bg: #080d1a;
    --card: rgba(255, 255, 255, 0.05);
    --card-hover: rgba(255, 255, 255, 0.09);
    --text: #ffffff;
    --muted: #94a3b8;
    --input-bg: rgba(255, 255, 255, 0.03);
    --input-border: rgba(255, 255, 255, 0.1);
    --panel-bg: rgba(15, 23, 42, 0.95);

    --income: #10b981;
    --expense: #ef4444;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --grad-blue: linear-gradient(135deg, #3b82f6, #1d4ed8);
    --grad-red: linear-gradient(135deg, #ef4444, #b91c1c);

    --item-income-bg: rgba(16, 185, 129, 0.08);
    --item-expense-bg: rgba(239, 68, 68, 0.08);
    --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
}

.light {
    --bg: #f8fafc;
    --card: #ffffff;
    --card-hover: #f1f5f9;
    --text: #0f172a;
    --muted: #64748b;
    --input-bg: #f8fafc;
    --input-border: #e2e8f0;
    --panel-bg: rgba(255, 255, 255, 0.98);

    --income: #059669;
    --expense: #dc2626;
    --blue: #2563eb;
    --amber: #d97706;
    --grad-blue: linear-gradient(135deg, #2563eb, #1d4ed8);
    --grad-red: linear-gradient(135deg, #dc2626, #b91c1c);

    --item-income-bg: rgba(5, 150, 105, 0.08);
    --item-expense-bg: rgba(220, 38, 38, 0.08);
    --shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
    padding-bottom: 340px; /* Form ကြီးသွားလို့ အောက်ခြေလွတ်အောင် ပိုချန်ထားပေးပါတယ် */
}

.container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* BRAND HEADER */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    padding: 14px 16px;
    border-radius: 20px;
    border: 1px solid var(--input-border);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
}

.brand-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header h3 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
}

.header p {
    font-size: 11px;
    color: var(--muted);
}

.right-actions {
    display: flex;
    gap: 8px;
    align-items: center;
}

.theme-btn, .setting-btn {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* SETTING PANEL */
.setting-panel {
    background: var(--panel-bg);
    border: 1px solid var(--input-border);
    border-radius: 24px;
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    animation: slideDown 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.feature-toggle-btn {
    width: 100%;
    padding: 12px 14px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text);
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
}

.feature-content {
    display: none;
    background: rgba(0,0,0,0.1);
    padding: 12px;
    border-radius: 12px;
    border: 1px dashed var(--input-border);
    flex-direction: column;
    gap: 8px;
}

.date-inputs { display: flex; gap: 8px; }
.date-inputs input {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--bg); color: var(--text); outline: none; font-size: 13px;
}

.lang-selector {
    width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--input-border); background: var(--bg); color: var(--text); outline: none; font-size: 13px;
}

.budget-action-group { display: flex; gap: 6px; }
.budget-action-group input {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--bg); color: var(--text); outline: none; font-size: 13px;
}
.budget-btn {
    padding: 0 16px; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; color: #fff;
}
.budget-btn.set { background: var(--blue); }
.budget-btn.edit { background: var(--amber); }

.view-chart-btn {
    padding: 12px; border: 1px solid var(--input-border); border-radius: 12px; background: var(--input-bg); color: var(--text); font-weight: 600; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 13px;
}

.chart-container {
    display: none; justify-content: center; max-height: 180px; margin-top: 5px;
}

/* BUDGET ALERT */
.budget-alert-box {
    display: none; background: var(--card); border: 1px solid var(--input-border); padding: 14px; border-radius: 16px; flex-direction: column; gap: 8px; box-shadow: var(--shadow);
}
.budget-status-text { font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; }
.progress-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; width: 0%; background: var(--income); transition: width 0.4s ease; }

/* BALANCE CARD */
.balance {
    background: var(--grad-blue);
    padding: 22px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.4);
}
.balance.negative {
    background: var(--grad-red);
    box-shadow: 0 15px 30px -10px rgba(239, 68, 68, 0.4);
}
.balance h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

/* STAT CARDS */
.cards { display: flex; gap: 10px; }
.card {
    flex: 1; padding: 14px; border-radius: 16px; background: var(--card); border: 1px solid var(--input-border); box-shadow: var(--shadow);
    font-size: 11px; color: var(--muted); font-weight: 500;
}
.card strong { font-size: 16px; color: var(--text); display: block; margin-top: 4px; font-weight: 700; }
.card.income { border-left: 4px solid var(--income); }
.card.expense { border-left: 4px solid var(--expense); }

/* ✨ BEAUTIFUL ONE-COLUMN BOTTOM SHEET FORM ✨ */
.form {
    background: var(--panel-bg); 
    padding: 24px 20px 28px 20px; 
    border-top-left-radius: 32px; 
    border-top-right-radius: 32px; 
    border: 1px solid var(--input-border); 
    display: flex; 
    flex-direction: column; 
    gap: 14px; 
    box-shadow: 0 -15px 35px rgba(0,0,0,0.4);
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
}

.form.hidden {
    transform: translate(-50%, 100%);
    opacity: 0;
    pointer-events: none;
}

/* Close Icon Button */
.form-close-btn {
    position: absolute;
    top: -14px;
    right: 24px;
    background: var(--expense);
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    z-index: 1001;
    font-size: 13px;
    transition: transform 0.2s ease;
}
.form-close-btn:active {
    transform: scale(0.9);
}

/* Floating Action Button to reopen Form */
.fab-open-form {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--blue);
    color: white;
    border: none;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    z-index: 998;
    font-size: 22px;
    animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes scaleUp {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

/* Beautiful Single-Column Input Style */
.form-group {
    display: flex;
    flex-direction: column;
    width: 100%;
}

.form input {
    width: 100%;
    padding: 14px 16px; 
    border-radius: 14px; 
    border: 1px solid var(--input-border); 
    background: var(--input-bg); 
    color: var(--text); 
    outline: none; 
    font-size: 14px;
    transition: all 0.25s ease;
}
.form input:focus { 
    border-color: var(--blue); 
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.type-switch {
    display: flex; 
    border-radius: 14px; 
    overflow: hidden; 
    background: rgba(0, 0, 0, 0.15); 
    padding: 4px; 
    border: 1px solid var(--input-border);
    width: 100%;
}
.type-switch button {
    flex: 1; 
    padding: 12px; 
    border: none; 
    cursor: pointer; 
    background: transparent; 
    color: var(--muted); 
    font-weight: 600; 
    border-radius: 10px; 
    font-size: 14px;
    transition: all 0.2s ease;
}
.active-income { background: var(--income) !important; color: #fff !important; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
.active-expense { background: var(--expense) !important; color: #fff !important; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }

.add {
    padding: 14px; 
    border: none; 
    border-radius: 14px; 
    background: var(--blue); 
    color: #fff; 
    font-weight: 600; 
    cursor: pointer; 
    font-size: 15px; 
    width: 100%;
    margin-top: 6px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    transition: all 0.2s ease;
}
.add:active {
    transform: scale(0.98);
}
.add.edit-mode-btn { background: var(--amber); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }

/* TRANSACTION LIST */
.month-header {
    margin: 16px 0 8px; font-size: 12px; color: var(--muted); font-weight: 700; display: flex; align-items: center; gap: 4px;
}
.item-table { display: flex; flex-direction: column; gap: 8px; }
.item {
    display: grid; grid-template-columns: 2fr 1.3fr 1.1fr 0.8fr; align-items: center; padding: 12px; border-radius: 14px; font-size: 13px; gap: 8px;
    background: var(--card); border: 1px solid var(--input-border); box-shadow: var(--shadow);
}
.item-desc { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-amt { font-weight: 700; text-align: right; }
.item-date { color: var(--muted); font-size: 11px; text-align: center; }

.action-btns { display: flex; gap: 4px; justify-content: flex-end; }
.edit-btn, .delete {
    border: none; color: #fff; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center;
}
.edit-btn { background: var(--amber); }
.delete { background: var(--expense); }

/* POPUP MODAL STYLES */
.modal-overlay {
    display: none; position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
    z-index: 1000; justify-content: center; align-items: center; padding: 16px;
}
.modal-content {
    background: var(--panel-bg); border: 1px solid var(--input-border); border-radius: 24px;
    width: 100%; max-width: 440px; max-height: 70vh; overflow-y: auto; padding: 20px; box-shadow: var(--shadow);
}
.modal-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--input-border); padding-bottom: 8px;
}
.modal-close-btn {
    background: var(--expense); color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <div class="brand-wrapper">
        <img src="logo.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
        <div class="header">
            <h3 id="lblTitle">Finance Tracker</h3>
            <p id="lblSubTitle">Advanced monthly tracker</p>
        </div>
    </div>
    
    <div class="right-actions">
        <div class="search">
            <select id="searchMonth" class="lang-selector" style="padding: 8px 12px; border-radius: 12px;" onchange="render()">
            </select>
        </div>      
        <button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
        <button class="setting-btn" onclick="toggleSettingPanel()"><i class="fa-solid fa-gear"></i></button>
    </div>
</div>

<div class="setting-panel" id="settingPanel">
    <button class="feature-toggle-btn" onclick="toggleSubFeature('langContent')">
        <span id="btnLangToggle">🌐 Language Selection</span>
        <span id="langIcon">▶</span>
    </button>
    <div class="feature-content" id="langContent">
        <select id="langSelect" class="lang-selector" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="mm">မြန်မာဘာသာ</option>
        </select>
    </div>

    <button class="feature-toggle-btn" onclick="toggleSubFeature('dateFilterContent')">
        <span id="btnDateToggle">📅 Date Range Filter</span>
        <span id="dateFilterIcon">▶</span>
    </button>
    <div class="feature-content" id="dateFilterContent">
        <div class="date-inputs">
            <input type="date" id="filterStartDate" onchange="render()">
            <input type="date" id="filterEndDate" onchange="render()">
        </div>
    </div>

    <button class="feature-toggle-btn" onclick="toggleSubFeature('budgetLimitContent')">
        <span id="btnBudgetToggle">💰 Monthly Budget Limit</span>
        <span id="budgetLimitIcon">▶</span>
    </button>
    <div class="feature-content" id="budgetLimitContent">
        <div class="budget-action-group">
            <input type="number" id="budgetLimitInput" placeholder="Enter Amount (MMK)" disabled>
            <button id="budgetActionBtn" class="budget-btn set" onclick="handleBudgetAction()">Set</button>
        </div>
    </div>

    <button class="view-chart-btn" id="btnViewChart" onclick="toggleChartSection()">📊 View Chart</button>
    
    <button class="view-chart-btn" id="btnClearData" style="background: rgba(239, 68, 68, 0.1); color: var(--expense); border-color: rgba(239, 68, 68, 0.2); margin-top: 6px;" onclick="clearAllData()">
        <i class="fa-solid fa-trash-can"></i>&nbsp;&nbsp;<span id="lblClearData">Clear All Data</span>
    </button>
    
    <div class="chart-container" id="chartContainer">
        <canvas id="financeChart"></canvas>
    </div>
</div>

<div class="budget-alert-box" id="budgetAlertBox">
    <div class="budget-status-text">
        <span id="budgetAlertTitle">⚠️ Budget Status</span>
        <span id="budgetAlertPercent">0%</span>
    </div>
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="budgetProgressBar"></div>
    </div>
</div>

<div class="balance" id="balance-card">
    <h2 id="balance">0 MMK</h2>
</div>

<div class="cards">
    <div class="card income"><span id="lblIncomeCard">Income</span><br><strong id="income">0</strong></div>
    <div class="card expense"><span id="lblExpenseCard">Expense</span><br><strong id="expense">0</strong></div>
</div>

<div class="list" id="list"></div>

<!-- 🌟 Beautiful One-Column Input Form -->
<div class="form" id="inputForm">
    <button class="form-close-btn" onclick="toggleForm(false)" title="Close Form"><i class="fa-solid fa-xmark"></i></button>
    
    <div class="form-group">
        <input id="text" placeholder="Description">
    </div>
    
    <div class="form-group">
        <input id="amount" type="number" placeholder="Amount">
    </div>
    
    <div class="form-group">
        <input id="date" type="date">
    </div>
    
    <div class="form-group">
        <div class="type-switch">
            <button id="incBtn" class="active-income" onclick="setType('income')">Inc</button>
            <button id="expBtn" onclick="setType('expense')">Exp</button>
        </div>
    </div>
    
    <button class="add" id="submitBtn" onclick="handleSubmit()">Add Transaction</button>
</div>

<!-- 🌟 Floating Button to Reopen Form -->
<button class="fab-open-form" id="fabOpenForm" onclick="toggleForm(true)" title="Open Form">
    <i class="fa-solid fa-plus"></i>
</button>

<div class="modal-overlay" id="filterModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="font-weight: 700;" id="modalTitle">📅 Filtered Results</h3>
            <button class="modal-close-btn" onclick="closeModal()">Close</button>
        </div>
        <div id="modalList"></div>
    </div>
</div>

</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let monthlyBudget = parseFloat(localStorage.getItem("monthlyBudget")) || 0;
let currentLang = localStorage.getItem("currentLang") || "en";
let type = "income";
let editId = null;
let isBudgetEditing = false;
let myChart = null; 

// Form Toggle Function
function toggleForm(show) {
    const form = document.getElementById("inputForm");
    const fab = document.getElementById("fabOpenForm");
    
    if (show) {
        form.classList.remove("hidden");
        fab.style.display = "none";
    } else {
        form.classList.add("hidden");
        fab.style.display = "flex";
    }
}

function initChart() {
    const ctx = document.getElementById('financeChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: currentLang === 'mm' ? ['🔴 သုံးပြီးသား (ထွက်ငွေ)', '🔵 လက်ကျန်ငွေ'] : ['🔴 Expense', '🔵 Remaining Balance'],
            datasets: [{
                data: [0, 0], 
                backgroundColor: ['#ef4444', '#3b82f6'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true,
                    position: 'bottom',
                    labels: {
                        color: '#ffffff', 
                        font: { size: 11, family: 'Plus Jakarta Sans' },
                        boxWidth: 12,
                        padding: 10
                    }
                }
            }
        }
    });
}

const languages = {
    en: {
        title: "Finance Tracker", subtitle: "Advanced monthly tracker", searchPlh: "Search...",
        langToggle: "🌐 Language Selection", dateToggle: "📅 Date Range Filter", budgetToggle: "💰 Monthly Budget Limit",
        viewChart: "📊 View Chart", incCard: "Income", expCard: "Expense",
        descPlh: "Description", amtPlh: "Amount", addBtn: "Add Transaction", updateBtn: "🔄 Update",
        budgetPlh: "Amount (MMK)", set: "Set", edit: "Edit", alertSafe: "🟢 Budget Safe", alertWarn: "⚠️ Near Limit!",
        alertCrit: "🚨 Budget Exceeded!", monthText: "Month", clearBtn: "Clear All Data"
    },
    mm: {
        title: "Finance Tracker", subtitle: "အဆင့်မြင့် လစဉ်သုံးစရိတ်မှတ်တမ်း", searchPlh: "ရှာဖွေရန်...",
        langToggle: "🌐 ဘာသာစကား ရွေးချယ်ရန်", dateToggle: "📅 ရက်စွဲအလိုက် စစ်ထုတ်ရန်", budgetToggle: "💰 လစဉ် အသုံးစရိတ် ကန့်သတ်ရန်",
        viewChart: "📊 အချိုးအစားပြဇယားကြည့်ရန်", incCard: "ဝင်ငွေ", expCard: "ထွက်ငွေ",
        descPlh: "အကြောင်းအရာ", amtPlh: "ပမာဏ", addBtn: "စာရင်းအသစ်ထည့်ရန်", updateBtn: "🔄 ပြင်ဆင်ရန်",
        budgetPlh: "သတ်မှတ်မည့်ပမာဏ", set: "သတ်မှတ်မည်", edit: "ပြင်ဆင်မည်", alertSafe: "🟢 အသုံးစရိတ် ပုံမှန်ရှိသည်", alertWarn: "⚠️ ကန့်သတ်ချက်နီးကပ်နေပြီ!",
        alertCrit: "🚨 ကန့်သတ်ချက် ကျော်လွန်သွားပြီ!", monthText: "လ", clearBtn: "ဒေတာအားလုံး ဖျက်သိမ်းရန်"
    }
};

document.getElementById("date").value = new Date().toISOString().split("T")[0];

initChart(); 
applyLanguage();
setupBudgetUI();
render();

function toggleSettingPanel() {
    const panel = document.getElementById("settingPanel");
    const chartContainer = document.getElementById("chartContainer");
    
    if(panel.style.display === "flex") {
        panel.style.display = "none";
        chartContainer.style.display = "none";
        document.getElementById("dateFilterContent").style.display = "none";
        document.getElementById("budgetLimitContent").style.display = "none";
        document.getElementById("langContent").style.display = "none";
        document.getElementById("dateFilterIcon").innerText = "▶";
        document.getElementById("budgetLimitIcon").innerText = "▶";
        document.getElementById("langIcon").innerText = "▶";
    } else {
        panel.style.display = "flex";
    }
}

function toggleSubFeature(id) {
    const content = document.getElementById(id);
    let iconId = "dateFilterIcon";
    if (id === "budgetLimitContent") iconId = "budgetLimitIcon";
    if (id === "langContent") iconId = "langIcon";
    const icon = document.getElementById(iconId);
    
    if(content.style.display === "flex") {
        content.style.display = "none";
        icon.innerText = "▶";
    } else {
        content.style.display = "flex";
        icon.innerText = "▼";
    }
}

function changeLanguage() {
    currentLang = document.getElementById("langSelect").value;
    localStorage.setItem("currentLang", currentLang);
    applyLanguage();
    setupBudgetUI();
    render();
}

function applyLanguage() {
    const lang = languages[currentLang];
    document.getElementById("lblTitle").innerText = lang.title;
    document.getElementById("lblSubTitle").innerText = lang.subtitle;
    document.getElementById("lblIncomeCard").innerText = lang.incCard;
    document.getElementById("lblExpenseCard").innerText = lang.expCard;
    document.getElementById("lblClearData").innerText = lang.clearBtn;
    
    const searchMonth = document.getElementById("searchMonth");
    const currentSelection = searchMonth.value || "";
    searchMonth.innerHTML = "";
    
    const allOpt = document.createElement("option");
    allOpt.value = "";
    allOpt.innerText = currentLang === 'mm' ? "📅 လအားလုံး" : "📅 All Months";
    searchMonth.appendChild(allOpt);
    
    const mmMonths = [
        "ဇန်နဝါရီ", "ဖေဖော်ဝါရီ", "မတ်", "ဧပြီ", "မေ", "ဇွန်", 
        "ဇူလိုင်", "သြဂုတ်", "စက်တင်ဘာ", "အောက်တိုဘာ", "နိုဝင်ဘာ", "ဒီဇင်ဘာ"
    ];
    
    for (let m = 0; m < 12; m++) {
        let monthName = currentLang === 'mm' ? mmMonths[m] : new Date(2026, m, 1).toLocaleString('default', { month: 'long' });
        const opt = document.createElement("option");
        opt.value = m.toString(); 
        opt.innerText = monthName;
        searchMonth.appendChild(opt);
    }
    
    searchMonth.value = currentSelection;
    document.getElementById("langSelect").value = currentLang;
    document.getElementById("btnLangToggle").innerText = lang.langToggle;
    document.getElementById("btnDateToggle").innerText = lang.dateToggle;
    document.getElementById("btnBudgetToggle").innerText = lang.budgetToggle;
    document.getElementById("btnViewChart").innerText = lang.viewChart;
    document.getElementById("text").placeholder = lang.descPlh;
    document.getElementById("amount").placeholder = lang.amtPlh;
    document.getElementById("incBtn").innerText = currentLang === 'mm' ? 'ဝင်ငွေ' : 'Inc';
    document.getElementById("expBtn").innerText = currentLang === 'mm' ? 'ထွက်ငွေ' : 'Exp';
    
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = editId === null ? lang.addBtn : lang.updateBtn;

    if (myChart) {
        myChart.data.labels = currentLang === 'mm' ? ['🔴 သုံးပြီးသား (ထွက်ငွေ)', '🔵 လက်ကျန်ငွေ'] : ['🔴 Expense', '🔵 Remaining Balance'];
        const isLight = document.body.classList.contains("light");
        myChart.options.plugins.legend.labels.color = isLight ? '#0f172a' : '#ffffff';
        myChart.update();
    }
}

function setupBudgetUI() {
    const input = document.getElementById("budgetLimitInput");
    const btn = document.getElementById("budgetActionBtn");
    const lang = languages[currentLang];
    input.placeholder = lang.budgetPlh;

    if (monthlyBudget > 0 && !isBudgetEditing) {
        input.value = monthlyBudget;
        input.disabled = true;
        btn.innerText = lang.edit;
        btn.className = "budget-btn edit";
    } else {
        if (!isBudgetEditing) input.value = "";
        input.disabled = false;
        btn.innerText = lang.set;
        btn.className = "budget-btn set";
    }
}

function handleBudgetAction() {
    const input = document.getElementById("budgetLimitInput");
    const btn = document.getElementById("budgetActionBtn");
    const lang = languages[currentLang];

    if (btn.innerText === lang.edit) {
        isBudgetEditing = true;
        setupBudgetUI();
        input.focus();
    } else {
        const val = parseFloat(input.value);
        monthlyBudget = isNaN(val) || val <= 0 ? 0 : val;
        localStorage.setItem("monthlyBudget", monthlyBudget);
        isBudgetEditing = false;
        setupBudgetUI();
        render();
    }
}

function toggleChartSection() {
    const chartContainer = document.getElementById("chartContainer");
    chartContainer.style.display = chartContainer.style.display === "flex" ? "none" : "flex";
    if (chartContainer.style.display === "flex") render();
}

function setType(t){
    type = t;
    document.getElementById("incBtn").classList.toggle("active-income", t==="income");
    document.getElementById("expBtn").classList.toggle("active-expense", t==="expense");
}

function handleSubmit() {
    if (editId === null) addTransaction();
    else updateTransaction();
}

function addTransaction(){
    const text=document.getElementById("text");
    const amount=document.getElementById("amount");
    const date=document.getElementById("date");

    if(!text.value || !amount.value || +amount.value <= 0) {
        alert(currentLang === 'mm' ? "အကြောင်းအရာနှင့် ပမာဏကို မှန်ကန်စွာဖြည့်စွက်ပါ!" : "Please enter a valid description and amount!");
        return;
    }

    transactions.push({
        id:Date.now(), text:text.value, amount:+amount.value, type,
        date:date.value || new Date().toISOString().split("T")[0]
    });

    saveToLocalStorage();
    resetForm();
    render();
}

function editTransaction(id) {
    const t = transactions.find(t => t.id === id);
    if (!t) return;

    editId = id;
    document.getElementById("text").value = t.text;
    document.getElementById("amount").value = t.amount;
    document.getElementById("date").value = t.date;
    setType(t.type);

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = languages[currentLang].updateBtn;
    submitBtn.classList.add("edit-mode-btn");
    
    // Auto reopen form when editing
    toggleForm(true);
}

function updateTransaction() {
    const text=document.getElementById("text");
    const amount=document.getElementById("amount");
    const date=document.getElementById("date");

    transactions = transactions.map(t => {
        if (t.id === editId) return { ...t, text: text.value, amount: +amount.value, type, date: date.value };
        return t;
    });

    saveToLocalStorage();
    resetForm();
    render();
}

function deleteTransaction(id){
    const msg = currentLang === 'mm' ? "ဤစာရင်းကို ဖျက်ရန် သေချာပါသလား?" : "Are you sure you want to delete this transaction?";
    if(!confirm(msg)) return;

    if(editId === id) resetForm();
    transactions=transactions.filter(t=>t.id!==id);
    saveToLocalStorage();
    render();
}

function clearAllData() {
    const msg = currentLang === 'mm' 
        ? "⚠ စာရင်းဒေတာအားလုံးကို ဖျက်ဆီးရန် သေချာပါသလား? ပြန်လည်ရယူ၍ မရနိုင်တော့ပါ။" 
        : "⚠ Are you sure you want to clear all data? This cannot be undone.";
        
    if(confirm(msg)) {
        transactions = [];
        monthlyBudget = 0;
        localStorage.clear();
        
        resetForm();
        isBudgetEditing = false;
        setupBudgetUI();
        toggleSettingPanel(); 
        render();
    }
}

function resetForm() {
    editId = null;
    document.getElementById("text").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = new Date().toISOString().split("T")[0];
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = languages[currentLang].addBtn;
    submitBtn.classList.remove("edit-mode-btn");
}

function saveToLocalStorage() {
    localStorage.setItem("transactions", JSON.stringify(transactions));
}

function updateChart(income, expense) {
    const incVal = Number(income) || 0;
    const expVal = Number(expense) || 0;
    const remainingBalance = incVal - expVal;

    if (incVal === 0 && expVal === 0) {
        if (myChart) { myChart.data.datasets[0].data = [0, 0]; myChart.update(); }
        return;
    }

    if (myChart) {
        myChart.data.datasets[0].data = [expVal, remainingBalance > 0 ? remainingBalance : 0];
        myChart.update();
    }
}

function checkBudgetStatus(currentExpense) {
    const alertBox = document.getElementById("budgetAlertBox");
    const barFill = document.getElementById("budgetProgressBar");
    const alertPercent = document.getElementById("budgetAlertPercent");
    const alertTitle = document.getElementById("budgetAlertTitle");
    const lang = languages[currentLang];

    if (monthlyBudget <= 0) { alertBox.style.display = "none"; return; }

    alertBox.style.display = "flex";
    const percent = Math.min((currentExpense / monthlyBudget) * 100, 100);
    alertPercent.innerText = `${Math.round(percent)}% (${currentExpense.toLocaleString()} / ${monthlyBudget.toLocaleString()})`;
    barFill.style.width = `${percent}%`;

    if (percent >= 100) {
        barFill.style.backgroundColor = "var(--expense)"; alertTitle.innerText = lang.alertCrit; alertTitle.style.color = "var(--expense)";
    } else if (percent >= 80) {
        barFill.style.backgroundColor = "var(--amber)"; alertTitle.innerText = lang.alertWarn; alertTitle.style.color = "var(--amber)";
    } else {
        barFill.style.backgroundColor = "var(--income)"; alertTitle.innerText = lang.alertSafe; alertTitle.style.color = "var(--income)";
    }
}

function closeModal() { document.getElementById("filterModal").style.display = "none"; }

function render(){
    const selectedMonth = document.getElementById("searchMonth").value;
    const startDateVal = document.getElementById("filterStartDate").value;
    const endDateVal = document.getElementById("filterEndDate").value;
    
    const list = document.getElementById("list");
    const modalList = document.getElementById("modalList");
    const modal = document.getElementById("filterModal");
    
    list.innerHTML = ""; modalList.innerHTML = "";
    const currentMonthIndex = new Date().getMonth().toString(); 
    const targetMonth = selectedMonth !== "" ? selectedMonth : currentMonthIndex;

    let totalIncome = 0; let totalExpense = 0; const groups = {};
    const isFiltered = (selectedMonth !== "" || startDateVal !== "" || endDateVal !== "");

    transactions.forEach(t => {
        const d = new Date(t.date);
        const itemMonthStr = d.getMonth().toString();

        if (itemMonthStr === targetMonth) {
            const amt = Number(t.amount) || 0;
            if (t.type === "income") totalIncome += amt; else totalExpense += amt;
        }

        if (selectedMonth !== "" && itemMonthStr !== selectedMonth) return;
        if (startDateVal && t.date < startDateVal) return;
        if (endDateVal && t.date > endDateVal) return;

        let label = d.toLocaleString(currentLang === 'mm' ? 'my-MM' : 'default', {month:'long', year:'numeric'});
        const key = d.getFullYear() + "-" + d.getMonth();
        if (!groups[key]) groups[key] = { date: d, label, income: 0, expense: 0, items: [] };
        groups[key].items.push(t);

        const amt = Number(t.amount) || 0;
        if (t.type === "income") groups[key].income += amt; else groups[key].expense += amt;
    });

    const targetContainer = isFiltered ? modalList : list;

    Object.values(groups).sort((a, b) => b.date - a.date).forEach(g => {
        const header = document.createElement("div");
        header.className = "month-header";
        header.innerText = `📅 ${g.label} • 🟢 +${g.income.toLocaleString()} / 🔴 -${g.expense.toLocaleString()}`;
        targetContainer.appendChild(header);

        const tableContainer = document.createElement("div");
        tableContainer.className = "item-table";

        g.items.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            const div = document.createElement("div");
            div.className = "item " + (t.type === "income" ? "badge-income" : "badge-expense");

            div.innerHTML = `
                <div class="item-desc" title="${t.text}">${t.text}</div>
                <div class="item-amt" style="color: var(--${t.type})">${t.type === 'income' ? '+' : '-'}${Number(t.amount).toLocaleString()}</div>
                <div class="item-date">${t.date}</div>
                <div class="action-btns">
                    <button class="edit-btn" onclick="closeModal(); editTransaction(${t.id})"><i class="fa-solid fa-pen"></i></button>
                    <button class="delete" onclick="deleteTransaction(${t.id});"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
            tableContainer.appendChild(div);
        });
        targetContainer.appendChild(tableContainer);
    });

    if (isFiltered) {
        modal.style.display = "flex";
        document.getElementById("modalTitle").innerText = selectedMonth !== "" 
            ? (currentLang === 'mm' ? "🔍 ရှာဖွေတွေ့ရှိသော ရလဒ်များ" : "🔍 Search Results")
            : (currentLang === 'mm' ? "📅 စစ်ထုတ်ထားသော မှတ်တမ်းများ" : "📅 Filtered Results");
    }

    const finalBalance = totalIncome - totalExpense;
    document.getElementById("income").innerText = totalIncome.toLocaleString() + " MMK";
    document.getElementById("expense").innerText = totalExpense.toLocaleString() + " MMK";
    document.getElementById("balance").innerText = finalBalance.toLocaleString() + " MMK";

    const balanceCard = document.getElementById("balance-card");
    if (finalBalance < 0) balanceCard.classList.add("negative"); else balanceCard.classList.remove("negative");

    checkBudgetStatus(totalExpense);
    updateChart(totalIncome, totalExpense);
}

function toggleTheme(){
    document.body.classList.toggle("light");
    applyLanguage(); 
    render();
}
</script>

</body>
