<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700&display=swap');

:root{
    --bg:#0b1220;
    --card:rgba(255,255,255,0.06);
    --text:#fff;
    --muted:rgba(255,255,255,0.6);
    --income:#22c55e;
    --expense:#ef4444;
    --blue:#3b82f6;
}

.light{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#111;
    --muted:#666;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
}

/* SEARCH */
.search input{
    padding:11px 14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.05);
    color:var(--text);
    outline:none;
    width:180px;
}

/* LIGHT FIX INPUT */
.light .search input{
    background:#fff;
    color:#111;
    border:1px solid #ddd;
}

/* BALANCE */
.balance{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    padding:18px;
    border-radius:16px;
    text-align:center;
    margin-bottom:15px;
}

/* CARDS */
.cards{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.card{
    flex:1;
    padding:15px;
    border-radius:15px;
    background:var(--card);
}

.income{border-left:4px solid var(--income);}
.expense{border-left:4px solid var(--expense);}

/* FORM */
.form{
    background:var(--card);
    padding:18px;
    border-radius:16px;
    margin-bottom:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.form input{
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);
    background:transparent;
    color:var(--text);
}

/* LIGHT FIX INPUT */
.light .form input{
    background:#fff;
    color:#111;
    border:1px solid #ddd;
}

/* TYPE BUTTON */
.type-switch{
    display:flex;
}

.type-switch button{
    flex:1;
    padding:10px;
    border:none;
    cursor:pointer;
    background:transparent;
    color:var(--text);
}

.active-income{background:var(--income);color:#000;}
.active-expense{background:var(--expense);color:#fff;}

/* ADD BUTTON */
.add{
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    color:#fff;
    font-weight:600;
}

/* LIST */
.item{
    display:flex;
    justify-content:space-between;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    background:var(--card);
}

.badge-income{border-left:4px solid var(--income);}
.badge-expense{border-left:4px solid var(--expense);}

/* POPUP */
.popup-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup{
    width:90%;
    max-width:420px;
    background:var(--bg);
    border:1px solid rgba(255,255,255,0.2);
    padding:15px;
    border-radius:15px;
    position:relative;
}

.close{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:#fff;
    border:none;
    border-radius:6px;
    padding:4px 8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <h3>💼 Finance Tracker</h3>

    <div class="search">
        <input id="search" placeholder="Search month (June 2026)">
    </div>

    <button onclick="openSearch()">🔍</button>
    <button onclick="toggleTheme()">🌙</button>
</div>

<div class="balance">
    <h2 id="balance">0 MMK</h2>
</div>

<div class="cards">
    <div class="card income">Income <br><strong id="income">0</strong></div>
    <div class="card expense">Expense <br><strong id="expense">0</strong></div>
</div>

<div class="form">
    <input id="text" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <div class="type-switch">
        <button id="incBtn" class="active-income" onclick="setType('income')">Income</button>
        <button id="expBtn" onclick="setType('expense')">Expense</button>
    </div>

    <button class="add" onclick="addTransaction()">Add</button>
</div>

<div id="list"></div>

</div>

<!-- POPUP -->
<div class="popup-bg" id="popup">
    <div class="popup" id="popupContent">
        <button class="close" onclick="closePopup()">X</button>
        <script>

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let type = "income";

function save(){
    localStorage.setItem("transactions", JSON.stringify(transactions));
}

function setType(t){
    type = t;
    document.getElementById("incBtn").classList.toggle("active-income", t==="income");
    document.getElementById("expBtn").classList.toggle("active-expense", t==="expense");
}

function addTransaction(){

    const text = document.getElementById("text");
    const amount = document.getElementById("amount");
    const date = document.getElementById("date");

    if(!text.value || !amount.value) return;

    transactions.push({
        id: Date.now(),
        text: text.value,
        amount: +amount.value,
        type: type,
        date: date.value || new Date().toISOString().split("T")[0]
    });

    text.value = "";
    amount.value = "";

    save();
    render();
}

function deleteTransaction(id){
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
}

function render(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    let income = 0;
    let expense = 0;

    const groups = {};

    // GROUP BY MONTH
    transactions.forEach(t => {

        const d = new Date(t.date);

        // FIX: proper sorting key (newest → oldest)
        const key = d.getFullYear() * 100 + d.getMonth();

        if(!groups[key]){
            groups[key] = {
                date: d,
                label: d.toLocaleString('default', {month:'long', year:'numeric'}),
                items: [],
                income: 0,
                expense: 0
            };
        }

        groups[key].items.push(t);

        if(t.type === "income") groups[key].income += t.amount;
        else groups[key].expense += t.amount;
    });

    // SORT MONTHS (NEWEST FIRST)
    Object.values(groups)
    .sort((a,b) => b.date - a.date)
    .forEach(g => {

        income += g.income;
        expense += g.expense;

        const header = document.createElement("div");
        header.className = "item";
        header.innerHTML = `
            <b>📅 ${g.label}</b><br>
            💰 ${g.income} | 💸 ${g.expense}
        `;
        list.appendChild(header);

        g.items.forEach(t => {

            const div = document.createElement("div");
            div.className = "item " + (t.type==="income" ? "badge-income" : "badge-expense");

            div.innerHTML = `
                <div>
                    <b>${t.text}</b><br>
                    <small>${t.date} • ${t.amount} MMK</small>
                </div>
                <button onclick="deleteTransaction(${t.id})">X</button>
            `;

            list.appendChild(div);
        });
    });

    // current month filter
const now = new Date();
const cm = now.getMonth();
const cy = now.getFullYear();

let monthIncome = 0;
let monthExpense = 0;

transactions.forEach(t => {
    const d = new Date(t.date);

    if(d.getMonth() === cm && d.getFullYear() === cy){
        if(t.type === "income") monthIncome += t.amount;
        else monthExpense += t.amount;
    }
});

document.getElementById("income").innerText = monthIncome;
document.getElementById("expense").innerText = monthExpense;
document.getElementById("balance").innerText = (monthIncome - monthExpense) + " MMK";
}
const mmMonths = ["ဇန်နဝါရီ","ဖေဖော်ဝါရီ","မတ်","ဧပြီ","မေ","ဇွန်","ဇူလိုင်","ဩဂုတ်","စက်တင်ဘာ","အောက်တိုဘာ","နိုဝင်ဘာ","ဒီဇင်ဘာ"];
const enMonths = ["january","february","march","april","may","june","july","august","september","october","november","december"];

function mmToEn(text){
    const q = text.trim().toLowerCase();

    const idx = mmMonths.findIndex(m => m.toLowerCase() === q);
    return idx !== -1 ? enMonths[idx] : q;
}
/* POPUP SEARCH */
function openSearch(){

    const q = mmToEn(document.getElementById("search").value);
    const box = document.getElementById("popupContent");

    box.innerHTML = '<button class="close" onclick="closePopup()">X</button>';

    const filtered = transactions.filter(t => {
        const label = new Date(t.date)
        .toLocaleString('default',{month:'long',year:'numeric'})
        .toLowerCase();

        return !q || label.includes(q);
    });

    if(filtered.length === 0){
        box.innerHTML += "<h3>No History</h3>";
    } else {

        let inc = 0;
        let exp = 0;

        filtered.forEach(t => {
            if(t.type==="income") inc += t.amount;
            else exp += t.amount;

            box.innerHTML += `
                <p>${t.date} • ${t.text} • ${t.amount} MMK</p>
            `;
        });

        box.innerHTML += `<hr><b>Income: ${inc} | Expense: ${exp}</b>`;
    }

    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function toggleTheme(){
    document.body.classList.toggle("light");
}

// FIRST LOAD
render();

</script>
</div> <!-- popup-content end -->
</div> <!-- popup-bg end -->

</body>
</html>
